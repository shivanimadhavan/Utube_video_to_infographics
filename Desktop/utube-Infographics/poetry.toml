[project]
name = "utube-to-infographics"
version = "0.1.0"
description = ""
authors = [
    {name = "Shivani Madhavan",email = "shivani.madhavan@iav.de"}
]
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "langgraph",
    "langchain",
    "langchain-openai",
    "fastapi",
    "uvicorn",
    "httpx",
    "app (>=0.0.1,<0.0.2)",
    "youtube-transcript-api (>=1.2.4,<2.0.0) ; python_version >= \"3.12\" and python_version < \"3.15\"",
    "pillow (>=12.1.1,<13.0.0)",
    "mcp (>=1.26.0,<2.0.0)"
]

[tool.poetry]
packages = [{include = "utube_to_infographics", from = "src"}]

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
